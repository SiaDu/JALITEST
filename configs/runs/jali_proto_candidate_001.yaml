# Run config for the first JALI prototype clip.
# Place this file at:
#   configs/runs/jali_proto_candidate_001.yaml

extends: configs/base.yaml

run:
  name: jali_proto_candidate_001_professor_crystal
  movie_id: tt0032138
  sequence_id: Jali_proto_candidate_001_ProfessorCrystal

inputs:
  candidate_sequences_jsonl: data/processed/candidate_sequences/Jali_proto_candidate_sequences.jsonl
  sequence_id: Jali_proto_candidate_001_ProfessorCrystal

  textgrid_summary_json: data/processed/textgrid/Jali_proto_candidate_001_ProfessorCrystal__textgrid_summary.json
  words_jsonl: data/processed/textgrid/Jali_proto_candidate_001_ProfessorCrystal__words.jsonl
  words_csv: data/processed/textgrid/Jali_proto_candidate_001_ProfessorCrystal__words.csv

  jali_emotion_options_yaml: configs/jali_emotion_options.yaml

outputs:
  output_dir: data/processed/gaze_scripts
  gaze_script_json: data/processed/gaze_scripts/Jali_proto_candidate_001_ProfessorCrystal__gaze_script.json
  emotion_annotation_json: data/processed/gaze_scripts/Jali_proto_candidate_001_ProfessorCrystal__emotion_annotation.json
  annotated_transcript_txt: data/processed/gaze_scripts/Jali_proto_candidate_001_ProfessorCrystal__annotated_for_jali.txt
  prompt_dump_md: data/processed/gaze_scripts/Jali_proto_candidate_001_ProfessorCrystal__prompt.md
  raw_llm_response_json: data/processed/gaze_scripts/Jali_proto_candidate_001_ProfessorCrystal__llm_raw.json

prompt_inputs:
  include_sequence_context: true
  include_shot_context: true
  include_word_timeline: true
  include_jali_emotion_options: true

validation:
  require_spans_resolvable_against_words: false
  warn_on_unresolved_spans: true
  forbid_offscreen_target: true
  allow_open_intents: true
