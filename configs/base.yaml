project:
  name: JaliTest
  default_movie_id: tt0032138
  default_sequence_id: Jali_proto_candidate_001_ProfessorCrystal

runtime:
  overwrite: false
  resume: true
  verbose: true
  random_seed: 42

llm:
  provider: openai
  model: gpt-5-mini
  temperature: 0.2
  max_output_tokens: 8000
  reasoning_effort: low
  api_key_env: OPENAI_API_KEY

shot_level:
  save_csv: true
  save_jsonl: true
  require_subtitle: true
  require_cast: false

alignment:
  use_gpt: true
  cache_responses: true
  resume: true
  max_retries: 3
  request_sleep_sec: 2
  max_context_shots: 8

candidate_sequence:
  min_duration_sec: 5
  max_duration_sec: 60
  min_shots: 1
  max_shots: 10
  min_utterances: 1
  min_speaker_changes: 0
  allow_unknown_speaker: true

gaze_script:
  schema_version: gaze_script_v1

  # Target changes are represented by the next gaze event.
  # If gaze should continue unchanged, do not create a new event.
  performance_annotation:
    sections:
    - ANALYZE
    - ANNOTATION
    - REASONS
    tag_style: state_change
    use_closing_tags: false
    tag_id_prefixes:
      gaze: g
      mask: m
      heart: h
    allowed_gaze_modes:
      - GAZE
      - GLANCE
      - AVERT

  intent_policy: open_vocab
  allowed_intents: null
  suggested_intents:
    - direct_address
    - persuasion
    - showmanship
    - deception
    - thinking
    - avoidance
    - reassurance
    - emphasis
    - social_control
    - emotional_leak

  # Use explicit semantic or directional targets instead.
  target_policy: controlled_vocab
  allowed_targets:
    - CHARACTER
    - LISTENER
    - OBJECT
    - DOWN
    - DOWN_LEFT
    - DOWN_RIGHT
    - UP
    - UP_LEFT
    - UP_RIGHT
    - LEFT
    - RIGHT

  emotion_annotation:
    enabled: true
    options_config: configs/jali_emotion_options.yaml
    output_mode: unified_readable_annotation
    allow_nested_mask_heart: true

textgrid:
  tier_name: words
  words_jsonl: data/processed/textgrid/Jali_proto_candidate_001_ProfessorCrystal__words.jsonl
  words_csv: data/processed/textgrid/Jali_proto_candidate_001_ProfessorCrystal__words.csv
  summary_json: data/processed/textgrid/Jali_proto_candidate_001_ProfessorCrystal__textgrid_summary.json

video_proxy:
  enabled: false
  fps: 25
  face_crop_margin: 0.25
  min_track_length_frames: 10
  min_openface_confidence: 0.8
  save_face_crops: true
