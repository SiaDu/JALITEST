project:
  name: JaliTest
  default_movie_id: tt0032138
  default_sequence_id: Jali_proto_candidate_001_ProfessorCrystal

runtime:
  overwrite: false
  resume: true
  verbose: true
  random_seed: 42

llm:
  provider: openai
  model: gpt-5-mini
  temperature: 0.2
  max_output_tokens: 8000
  reasoning_effort: low
  api_key_env: OPENAI_API_KEY

shot_level:
  save_csv: true
  save_jsonl: true
  require_subtitle: true
  require_cast: false

alignment:
  use_gpt: true
  cache_responses: true
  resume: true
  max_retries: 3
  request_sleep_sec: 2
  max_context_shots: 8

candidate_sequence:
  min_duration_sec: 5
  max_duration_sec: 60
  min_shots: 1
  max_shots: 10
  min_utterances: 1
  min_speaker_changes: 0
  allow_unknown_speaker: true

