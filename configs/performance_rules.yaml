performance_rules:
  schema_version: performance_rules_v1

  performance_annotation:
    General rules:
    - All [ANNOTATION] tags MUST use XML-like angle syntax: <tagID=value>text</tagID>.
    - Never write bare tags such as `g01=GAZE-CHARACTER_DOROTHY text`; bare tags become fake transcript words and break TextGrid alignment.
    - ALWAYS set the lid_state tag, gaze tag and mask tag at the beginning of each performance segment, using angle tags.
    - Add tags only when the performance state or local acting beat changes.
    - Every tag must be visually meaningful and executable.
    - Every tag must be explained in [REASONS].
    - Prefer closing tags for local phrase-level beats. Opening-only state tags are allowed only when they should continue until the next same-type tag.

    tag_syntax_examples:
      correct:
      - "<l01=-2>That's right.</l01>"
      - "<g01=GAZE-CHARACTER_DOROTHY>Here -- sit right down here.</g01>"
      - "<m01=Friendly-70>Ha ha!</m01>"
      incorrect:
      - "l01=-2 That's right."
      - "g01=GAZE-CHARACTER_DOROTHY Here -- sit right down here."
      - "m01=Friendly-70 Ha ha!"

    tag_id_prefixes:
      gaze: g
      mask: m
      heart: h
      lid_state: l
      performative_blink: pb
      blink_suppression: bs

    Gaze rules:
    - Use gaze tags for semantic attention, social control, avoidance, thought, and object focus.
    - Allowed gaze modes are GAZE, GLANCE, and AVERT.
    - GAZE means sustained look toward target.
    - GLANCE means brief look toward target.
    - AVERT means sustained avoidance from the main social target.
    - Infer gaze targets from the transcript and context. Should use concrete targets. eg. OBJECT_CRYSTAL instead of OBJECT; CHARACTER_DOROTHY instead of CHARACTER.

    Gaze allowed_targets:
      - CHARACTER_CharacterName
      - OBJECT_ObjectName
      - DOWN
      - DOWN_LEFT
      - DOWN_RIGHT
      - UP
      - UP_LEFT
      - UP_RIGHT
      - LEFT
      - RIGHT

    Mask / heart rules:
    - Use mask tags for visible facial performance.
    - Use heart tags only when the inner state differs from visible mask.
    - Do not use heart as a generic second emotion layer.
    - Use mask and heart names from the JALI emotion options when provided.
    - Keep strength values moderate unless the acting beat extremely demands more.

    Lid / blink rules:
    - Do not annotate ordinary regulatory blinks.
    - ALWAYS set lid_state scale tag at beginning.
    - Use lid_state tags change only for sustained eyelid baseline changes, not as a second emotion label.
    - Use performative_blink only when the blink itself is an acting choice.
    - Use blink_suppression only when not blinking is the acting choice.

    Lid_state scale, use these as energy/affective/cognitive state reference, refers to how large eye open:
    -5: fully wide, manic / possessed / extreme fear (extremely open)
    -4: feverish, unstable, obsessive
    -3: intense, neurotic, over-alert
    -2: shocked / angry / excited
    -1: heightened attention
    0: default (eye open)
    1: relaxed / neutral
    2: soft / warm / receptive
    3: guarded / impatient / skeptical
    4: sleepy / withdrawn / flat dislike / emotionally closed (eye close)

    Performative blink modes:
    - DOUBLE_BLINK or BLINK_CLUSTER: guilty / nervous / uncertain
    - EYE_CLOSE_HOLD: thinking, avoidance, unwillingness to look, emotional suppression, prayer, mystical concentration, fatigue, demonstration
    - SLOW_BLINK: cognitive retrieval, remembering, fabricating a story, searching for words
