maya_eye_performance:
  repo_root: .
  eye_events_path: data/processed/gaze_script/llm_process/Jali_proto_candidate_001_ProfessorCrystal__eye_performance_events_resolved.json

  fps: 30.0
  clip_end_frame: 1064.2

  eyelid_control_suffix: LIDS_jSync_plusMinus
  eyelid_attr: Down_upLids_jSync
  default_lid_state: 0.0

  # JALI blink is removed/replaced by ExpreGaze blink.
  clear_existing_eyelid_keys: true
  #jali_attribute_overrides:
  #  jSync1:
  #    calculate_blinks: false
  #    blink_frequency: 0.0
  #    long_blink_variation: false

  lid_state_transition_frames: 8
  apply_weighted_flat_tangents: true

  # Values are keyed onto:
  #   LIDS_jSync_plusMinus.Down_upLids_jSync
  # Your working interpretation:
  #   lid_state -9..4 controls sustained eyelid openness.
  #   blink closure uses higher positive values; 9 is full eye close.
  blink_presets:
    SINGLE_BLINK:
      closure: 7
      close_frames: 2
      hold_frames: 1
      open_frames: 2
      count: 1
      gap_frames: 0

    VERY_SUBTLE_BLINK:
      closure: 4
      close_frames: 1
      hold_frames: 1
      open_frames: 1
      count: 1
      gap_frames: 0

    DOUBLE_BLINK:
      closure: 7
      close_frames: 2
      hold_frames: 1
      open_frames: 2
      count: 2
      gap_frames: 4

    BLINK_CLUSTER:
      closure: 6
      close_frames: 1
      hold_frames: 1
      open_frames: 2
      count: 3
      gap_frames: 3

    EYE_CLOSE_HOLD:
      closure: 9
      close_frames: 4
      hold_frames: 16
      open_frames: 6
      count: 1
      gap_frames: 0

    SLOW_BLINK:
      closure: 8
      close_frames: 5
      hold_frames: 4
      open_frames: 6
      count: 1
      gap_frames: 0
