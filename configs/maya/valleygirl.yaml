maya_common:
  repo_root: .
  maya_project_root: E:/maya_project/JALI_test

maya_gaze:
  eye_stare_node_suffix: eyeStare_world
  clear_existing_eye_stare_translate_keys: true
  gaze_transition_frames: 3
  glance_transition_frames: 3
  apply_weighted_flat_tangents: true

  # Gaze targets are not listed here. They are read dynamically from:
  #   data/processed/gaze_script/{sequence_id}__gaze_events_resolved.json
  #
  # Workflow:
  #   1) run tools/maya/run_create_gaze_targets.py
  #   2) move created locators manually in Maya
  #   3) run tools/maya/run_apply_gaze_events.py
  dynamic_target_locator_group: JALITEST_gaze_targets_GRP
  dynamic_target_locator_size: 4.0
  dynamic_target_locator_suffix: _lookat_LOC
  dynamic_target_locator_role_offsets:
    CHARACTER: [-35.0, 0.0, 0.0]
    OBJECT: [35.0, -10.0, 0.0]
    EXPLICIT: [0.0, 0.0, 0.0]

  dynamic_target_locator_offsets:
    DOROTHY: [-35.0, 0.0, 0.0]
    CHARACTER_DOROTHY: [-35.0, 0.0, 0.0]
    CRYSTAL: [0.0, -22.0, 0.0]
    OBJECT_CRYSTAL: [0.0, -22.0, 0.0]
    PHOTOGRAPH: [35.0, -10.0, 0.0]
    OBJECT_PHOTOGRAPH: [35.0, -10.0, 0.0]

  # Lower JALI ambient gaze so ExpreGaze's eyeStare_world overlay is readable.
  # jali_attribute_overrides:
  #   jSync1:
  #     ambient_gaze_intensity: 1

  direction_offsets:
    DOWN: [0.0, -25.0, 0.0]
    DOWN_LEFT: [-40.0, -25.0, 0.0]
    DOWN_RIGHT: [40.0, -25.0, 0.0]
    UP: [0.0, 25.0, 0.0]
    UP_LEFT: [-40.0, 25.0, 0.0]
    UP_RIGHT: [40.0, 25.0, 0.0]
    LEFT: [-40.0, 0.0, 0.0]
    RIGHT: [40.0, 0.0, 0.0]

maya_eye_performance:
  eyelid_control_suffix: LIDS_jSync_plusMinus
  eyelid_attr: Down_upLids_jSync
  default_lid_state: 0.0
  clear_existing_eyelid_keys: true
  lid_state_transition_frames: 8
  apply_weighted_flat_tangents: true

  blink_presets:
    SINGLE_BLINK:
      closure: 7
      close_frames: 2
      hold_frames: 1
      open_frames: 2
      count: 1
      gap_frames: 0
    VERY_SUBTLE_BLINK:
      closure: 4
      close_frames: 1
      hold_frames: 1
      open_frames: 1
      count: 1
      gap_frames: 0
    DOUBLE_BLINK:
      closure: 7
      close_frames: 2
      hold_frames: 1
      open_frames: 2
      count: 2
      gap_frames: 4
    BLINK_CLUSTER:
      closure: 6
      close_frames: 1
      hold_frames: 1
      open_frames: 2
      count: 3
      gap_frames: 3
    EYE_CLOSE_HOLD:
      closure: 9
      close_frames: 4
      hold_frames: 16
      open_frames: 6
      count: 1
      gap_frames: 0
    SLOW_BLINK:
      closure: 8
      close_frames: 5
      hold_frames: 4
      open_frames: 6
      count: 1
      gap_frames: 0

maya_jali_annotation:
  jsync_node: jSync1
  backup_original_transcript: true
  trigger_jsync_compute: true
  # JALI annotation injection should not turn JALI automatic blinks back on.
  # ExpreGaze replaces blink/lid animation later.
  # jali_attribute_overrides:
  #   calculate_blinks: false
